site_name: OpenTalking
site_description: Open-source real-time digital-human orchestration layer with pluggable model backends, LLM, TTS, WebRTC, and character voices.
site_url: https://datascale-ai.github.io/opentalking/
repo_url: https://github.com/datascale-ai/opentalking
repo_name: datascale-ai/opentalking
edit_uri: edit/main/docs/

exclude_docs: |
  requirements.txt
  */design/architecture-review.md
  */design/realtime-digital-human-research.md
  */design/wav2lip-v2-integration.md
  */roadmap/

theme:
  name: material
  language: zh
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/datascale-ai/opentalking

extra_css:
  - assets/stylesheets/navigation.css

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          name: 中文
