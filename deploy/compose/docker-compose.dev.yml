version: "3.9"

# Dev profile: redis + api + web only. omnirt is mocked / external; useful for
# frontend development against the API surface without GPU.

services:
  redis:
    image: redis:7-alpine

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.api
    env_file: ../../.env
    environment:
      OPENTALKING_REDIS_URL: redis://redis:6379/0
      OPENTALKING_INFERENCE_MOCK: "1"
    depends_on: [redis]
    ports: ["8000:8000"]

  web:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.web
    ports: ["5173:5173"]
    depends_on: [api]
