version: "3.9"

# CUDA profile: omnirt + redis + opentalking api/worker + web frontend.
# Triggered by `bash scripts/install.sh docker` on a CUDA host.

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  omnirt:
    image: ghcr.io/datascale-ai/omnirt:cuda-latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports: ["9000:9000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 10s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.api
    env_file: ../../.env
    environment:
      OMNIRT_ENDPOINT: http://omnirt:9000
      OPENTALKING_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
      omnirt: { condition: service_healthy }
    ports: ["8000:8000"]

  worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.worker
    env_file: ../../.env
    environment:
      OMNIRT_ENDPOINT: http://omnirt:9000
      OPENTALKING_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
      omnirt: { condition: service_healthy }

  web:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.web
    ports: ["5173:5173"]
    depends_on: [api]
